spring.application.name=Kasa

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cryptopal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cryptopal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cryptopal_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

cryptopal.auth.session-ttl-minutes=${CRYPTOPAL_SESSION_TTL_MINUTES:1440}
cryptopal.market.base-url=${CRYPTOPAL_MARKET_BASE_URL:https://api.binance.com}
cryptopal.market.symbols=${CRYPTOPAL_MARKET_SYMBOLS:BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT}
cryptopal.market.refresh-interval-ms=${CRYPTOPAL_MARKET_REFRESH_INTERVAL_MS:15000}
