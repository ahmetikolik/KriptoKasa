services:
  postgres:
    image: postgres:16
    container_name: cryptopal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptopal
      POSTGRES_USER: cryptopal
      POSTGRES_PASSWORD: cryptopal_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cryptopal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: